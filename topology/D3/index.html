<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datacenter Network Topology — Option C</title>
  <link rel="stylesheet" href="css/style.css">

  <!--
    Import map: maps the bare specifier "d3" to D3 v7 ESM build on jsDelivr.
    No bundler, no build step — open index.html directly in a browser or via
    any trivial static server (e.g. `python3 -m http.server`).
  -->
  <script type="importmap">
    {
      "imports": {
        "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm"
      }
    }
  </script>
</head>
<body>

  <header class="page-header">
    <h1>Datacenter Network Topology</h1>
    <p class="subtitle">
      Option C &nbsp;·&nbsp; Standard Leaf-Spine Pod
      &nbsp;·&nbsp; Radial Layered (Sugiyama) Dendrogram Graph
    </p>
  </header>

  <main class="chart-container">
    <!--
      SVG dimensions and viewBox are set programmatically by render.js.
      The element must exist in the DOM before the module executes.
    -->
    <svg id="topology" role="img" aria-label="Radial topology diagram — Option C datacenter pod"></svg>
  </main>

  <!--
    Legend + controls bar.
    Row 1 (controls): plane toggle buttons that show/hide link sets (§8.2).
    Row 2 (legend):   static ring-depth key with coloured chips and an
                      interaction hint.
  -->
  <div class="controls" id="plane-toggles">
    <span class="controls-label">Planes:</span>
    <button class="toggle-btn active" data-plane="data">Data</button>
    <button class="toggle-btn active" data-plane="mgmt">Management</button>
    <button class="toggle-btn active" data-plane="shared">Containment</button>
  </div>

  <div class="ring-legend" role="list" aria-label="Ring depth key">
    <span class="controls-label" aria-hidden="true">Rings:</span>
    <span class="legend-ring" data-ring="R1" role="listitem">Pod</span>
    <span class="legend-arrow" aria-hidden="true">→</span>
    <span class="legend-ring" data-ring="R3" role="listitem">Spine</span>
    <span class="legend-arrow" aria-hidden="true">→</span>
    <span class="legend-ring" data-ring="R4" role="listitem">Leaf</span>
    <span class="legend-arrow" aria-hidden="true">→</span>
    <span class="legend-ring" data-ring="R5" role="listitem">Rack</span>
    <span class="legend-arrow" aria-hidden="true">→</span>
    <span class="legend-ring" data-ring="R6" role="listitem">Server</span>
    <span class="legend-arrow" aria-hidden="true">·</span>
    <span class="legend-ring" data-ring="border" role="listitem">Border Leaf</span>
    <span class="legend-hint">· Hover any arc to focus</span>
  </div>

  <footer>
    <p>Option C — standard leaf-spine datacenter pod &nbsp;·&nbsp; D3.js v7</p>
  </footer>

  <script type="module">
    import { init, drawLinks } from './js/render.js';
    import { initInteraction } from './js/interaction.js';

    // Phase 1: static ring geometry
    const { root, layoutNodes, links } = init('#topology');

    // Phase 2: plain links, plane-colour-coded
    drawLinks(root, layoutNodes, links);


    // Phase 4: hover/focus behaviour + plane toggles
    initInteraction(root, layoutNodes, links);

    window.__topology = { root, layoutNodes, links };
  </script>

</body>
</html>
