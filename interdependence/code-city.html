<!DOCTYPE html>
<meta charset="utf-8" />
<html lang="en">
<head>
  <title>Code City Voronoi</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
      body {
          margin: 0;
          font-family: 'Ubuntu', sans-serif;
          background: #121212;
          color: #eee;
      }

      .legend {
          font-family: 'Ubuntu', sans-serif;
          color: #3a3a3b;
      }

      svg {
          width: 100vw;
          height: 100vh;
          display: block;
          background: #f5f5f5;
      }

      .cell {
          cursor: pointer;
          transition: stroke-width 0.2s, stroke 0.2s;
      }

      .cell.highlighted {
          stroke: #ffeb3b;
          stroke-width: 2.5px;
      }

      .tooltip {
          position: absolute;
          background: #f5f5f5;
          color: #121212;
          padding: 10px 12px;
          border: 1px solid #c5c5c5;
          font-size: 13px;
          pointer-events: none;
          visibility: hidden;
          white-space: nowrap;
          max-width: 320px;
      }

      .tooltip-title {
          font-size: 16px;
          font-weight: 700;
          margin-bottom: 6px;
      }

      .tooltip-field {
          font-size: 13px;
          margin-top: 2px;
          color: #5b5b5b;
      }
  </style>
</head>
<body>
<svg></svg>
<div class="tooltip" id="tooltip"></div>
<script>
  const width = window.innerWidth;
  const height = window.innerHeight;
  const svg = d3.select("svg").attr("width", width).attr("height", height);
  const g = svg.append("g");
  const tooltip = d3.select("#tooltip");
  let selectedCell = null;

  d3.json("component-dependencies.json").then(data => {
    const nodesMap = new Map();
    const links = [];

    for (const [target, sources] of Object.entries(data)) {
      if (!nodesMap.has(target)) nodesMap.set(target, { id: target });
      if (Array.isArray(sources)) {
        sources.forEach(source => {
          if (!nodesMap.has(source)) nodesMap.set(source, { id: source });
          links.push({ source, target });
        });
      } else if (sources && typeof sources === "object") {
        const deps = Array.isArray(sources.dependencies) ? sources.dependencies : [];
        deps.forEach(source => {
          if (!nodesMap.has(source)) nodesMap.set(source, { id: source });
          links.push({ source, target });
        });
        if (typeof sources.loc === "number") {
          nodesMap.get(target).loc = sources.loc;
        }
      }
    }

    const categories = [
      "base", "controllers", "devices", "domains", "images", "intro", "kvm",
      "machines", "networkDiscovery", "pools", "preferences", "settings",
      "subnets", "tags", "zones",
    ];

    const palette = {
      base: "#e25322",
      controllers: "#e53147",
      devices: "#ef9514",
      domains: "#3fad4f",
      images: "#1bafe4",
      intro: "#73266f",
      kvm: "#4c4b3a",
      machines: "#645cc5",
      networkDiscovery: "#1e55ad",
      pools: "#2c4e50",
      preferences: "#3b501c",
      settings: "#8d292f",
      subnets: "#204d37",
      tags: "#7f824b",
      zones: "#7f6b55",
      other: "#598680",
    };

    function getCategory(filePath) {
      const firstSegment = filePath.split("/")[0];
      return categories.includes(firstSegment) ? firstSegment : "other";
    }

    function getCategoryColor(filePath) {
      const category = getCategory(filePath);
      return palette[category];
    }

    const barrenNodes = [];
    const barrenCount = 80;
    for (let i = 0; i < barrenCount; i++) {
      barrenNodes.push({
        id: "barren_" + i,
        x: Math.random() * width,
        y: Math.random() * height,
        barren: true,
        degree: 0,
        loc: 0,
      });
    }

    const nodes = Array.from(nodesMap.values());

    nodes.forEach(node => {
      node.degree = links.filter(l => l.source === node.id || l.target === node.id).length;
      node.category = getCategory(node.id);
      node.x = width / 2 + (Math.random() - 0.5) * 50;
      node.y = height / 2 + (Math.random() - 0.5) * 50;
      if (node.loc === undefined && data[node.id] && typeof data[node.id] === "object" && typeof data[node.id].loc === "number") {
        node.loc = data[node.id].loc;
      }
    });

    const allNodes = [...nodes, ...barrenNodes];
    const categoryNodes = d3.groups(nodes, d => d.category);

    const categoryLinks = [];
    categoryNodes.forEach(([cat, catNodes]) => {
      for (let i = 0; i < catNodes.length; i++) {
        for (let j = i + 1; j < catNodes.length; j++) {
          categoryLinks.push({ source: catNodes[i].id, target: catNodes[j].id });
        }
      }
    });

    const maxDegree = d3.max(nodes, d => d.degree) || 1;
    const cityRadius = Math.min(width, height) / 20;
    const maxLoC = d3.max(nodes, d => d.loc || 1);
    const districts = d3.group(nodes, d => d.category);

    function districtCentroid(nodes) {
      let x = 0, y = 0;
      nodes.forEach(n => {
        x += n.x;
        y += n.y;
      });
      return [x / nodes.length, y / nodes.length];
    }

    function forceDistrictRepulsion(categories, center, strength = 0.02) {
      return () => {
        categories.forEach(nodes => {
          if (!nodes.length) return;

          const [cx, cy] = districtCentroid(nodes);
          const dx = cx - center[0];
          const dy = cy - center[1];
          const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;


          const f = strength * dist;

          nodes.forEach(node => {
            node.vx += (dx / dist) * f;
            node.vy += (dy / dist) * f;
          });
        });
      };
    }

    const simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d => d.id).distance(200))
      .force("categoryLink", d3.forceLink(categoryLinks)
        .id(d => d.id)
        .distance(250)
        .strength(0.01),
      )
      .force("charge", d3.forceManyBody().strength(-1))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .force("radial", d3.forceRadial(
        d => {
          if (d.barren) return Math.min(width, height);
          const normalized = maxDegree ? d.degree / maxDegree : 0;
          const minRadius = 50;
          return minRadius + (1 - normalized) * cityRadius;
        },
        width / 2,
        height / 2,
      ))
      .force("collision", d3.forceCollide().radius(d => {
        const locWeight = (d.loc || 10) / maxLoC;
        return (10 + locWeight * d.degree) / 10;
      }))
      .force("districtRepulsion", forceDistrictRepulsion(districts, [width / 2, height / 2], 0.01));

    function updateVoronoi() {
      const delaunay = d3.Delaunay.from(allNodes, d => d.x, d => d.y);
      const voronoi = delaunay.voronoi([0, 0, width, height]);

      const cells = g.selectAll("path.cell")
        .data(nodes, d => d.id);

      cells.join("path")
        .attr("class", d => d === selectedCell ? "cell highlighted" : "cell")
        .attr("d", (d, i) => voronoi.renderCell(i))
        .attr("fill", d => getCategoryColor(d.id))
        .attr("stroke", "#f5f5f5")
        .attr("stroke-width", 2)
        .on("click", (event, d) => {
          if (selectedCell === d) {
            selectedCell = null;
            tooltip.style("visibility", "hidden");
          } else {
            selectedCell = d;
            showTooltip(event, d);
          }
          updateVoronoi();
          event.stopPropagation();
        });
    }

    function updateHull() {
      const hullPoints = d3.polygonHull(nodes.map(d => [d.x, d.y]));
      if (!hullPoints) return;

      const hullPath = d3.line()
        .x(d => d[0])
        .y(d => d[1])
        .curve(d3.curveCardinalClosed.tension(0.001));

      let clip = svg.select("clipPath#hull-clip");
      if (clip.empty()) {
        clip = svg.append("clipPath").attr("id", "hull-clip");
        clip.append("path");
        g.attr("clip-path", "url(#hull-clip)");
      }

      clip.select("path").attr("d", hullPath(hullPoints));
    }

    function showTooltip(event, d) {
      const basename = d.id.split("/").pop().replace(/\.[tj]sx?$/, "");
      const category = d.category;
      const degree = d.degree ?? 0;
      const loc = (d.loc !== undefined) ? d.loc : (data[d.id] && data[d.id].loc !== undefined ? data[d.id].loc : "N/A");

      tooltip.html(
        `<div class="tooltip-title">${escapeHtml(basename)}</div>
         <div class="tooltip-field">Category: <strong>${escapeHtml(String(category))}</strong></div>
         <div class="tooltip-field">Degree: <strong>${escapeHtml(String(degree))}</strong></div>
         <div class="tooltip-field">LoC: <strong>${escapeHtml(String(loc))}</strong></div>`,
      ).style("visibility", "visible");

      requestAnimationFrame(() => {
        const padding = 10;
        const nodeRect = tooltip.node().getBoundingClientRect();
        let left = event.pageX + 12;
        let top = event.pageY + 12;

        if (left + nodeRect.width + padding > window.innerWidth) left = window.innerWidth - nodeRect.width - padding;
        if (top + nodeRect.height + padding > window.innerHeight) top = window.innerHeight - nodeRect.height - padding;
        if (left < padding) left = padding;
        if (top < padding) top = padding;

        tooltip.style("left", left + "px").style("top", top + "px");
      });
    }

    function renderLegend(categories) {
      const legend = d3.select("body")
        .append("div")
        .attr("class", "legend")
        .style("position", "absolute")
        .style("bottom", "10px")
        .style("right", "10px")
        .style("padding", "8px")
        .style("font-size", "12px");

      const items = legend.selectAll(".legend-item")
        .data(categories)
        .enter()
        .append("div")
        .attr("class", "legend-item")
        .style("display", "flex")
        .style("align-items", "center")
        .style("margin-bottom", "4px");

      items.append("div")
        .style("width", "16px")
        .style("height", "16px")
        .style("background", d => getCategoryColor(d))
        .style("margin-right", "6px");

      items.append("span").text(d => d);
    }

    renderLegend(categories);

    simulation.on("tick", () => {
      nodes.forEach(d => {
        d.x = Math.max(0, Math.min(width - 20, d.x));
        d.y = Math.max(0, Math.min(height - 20, d.y));
      });
      updateVoronoi();
      updateHull();
    });

    svg.call(
      d3.zoom()
        .scaleExtent([1, 5])
        .on("zoom", (event) => {
          const t = event.transform;
          const k = t.k;
          const tx = Math.min(0, Math.max(width - width * k, t.x));
          const ty = Math.min(0, Math.max(height - height * k, t.y));
          g.attr("transform", `translate(${tx},${ty}) scale(${k})`);

          if (selectedCell) {
            selectedCell = null;
            tooltip.style("visibility", "hidden");
            updateVoronoi();
          }
        }),
    );

    svg.on("click", (event) => {
      if (event.target.tagName === "svg" && selectedCell) {
        selectedCell = null;
        tooltip.style("visibility", "hidden");
        updateVoronoi();
      }
    });
  });

  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, (c) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#39;",
    }[c]));
  }
</script>
</body>
</html>
